<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="vendor/codemirror/codemirror.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 480px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #202124;
      padding: 16px;
    }
    h2 { font-size: 15px; }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      margin-bottom: 4px;
    }
    .row { display: flex; gap: 6px; margin-bottom: 10px; }
    select, input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      min-width: 0;
    }
    select:focus, input:focus { outline: none; border-color: #4285f4; }
    .icon-btn {
      width: 30px;
      padding: 0;
      background: #fff;
      color: #5f6368;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .icon-btn:hover { background: #f8f9fa; color: #202124; }
    .settings-panel {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 10px;
      display: none;
    }
    .settings-panel.open { display: block; }
    .settings-panel .row { margin-bottom: 0; }
    button.primary {
      width: 100%;
      padding: 8px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary:hover { background: #3367d6; }
    button.primary:disabled { background: #9aa0a6; cursor: default; }
    .editor-shell {
      border: 1px solid #dadce0;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .editor-shell:focus-within { border-color: #4285f4; }
    .CodeMirror {
      height: 220px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .CodeMirror-gutters { background: #fafafa; border-right: 1px solid #eee; }
    .CodeMirror-linenumber { color: #9aa0a6; }
    .CodeMirror-activeline-background { background: #f4f7fe !important; }
    .result-card {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 10px;
      margin-top: 12px;
    }
    .result-card .cost {
      font-size: 22px;
      font-weight: 700;
      color: #4285f4;
    }
    .result-card .bytes { color: #5f6368; margin-top: 4px; }
    .result-card .proj { color: #9aa0a6; margin-top: 4px; font-size: 11px; }
    .error {
      background: #fce8e6;
      color: #c5221f;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 12px;
    }
    .hint {
      font-size: 11px;
      color: #9aa0a6;
      line-height: 1.4;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>bqcheck</h2>
    <button id="settings-toggle" class="icon-btn" title="Settings">&#9881;</button>
  </div>

  <div id="settings-panel" class="settings-panel">
    <label for="price-input">Price per TiB (USD)</label>
    <div class="row">
      <input id="price-input" type="number" step="0.01" min="0" />
    </div>
  </div>

  <label for="project-select">Project</label>
  <div class="row">
    <select id="project-select"></select>
    <button id="project-refresh" class="icon-btn" title="Refresh project list">&#8635;</button>
  </div>

  <label>SQL</label>
  <div class="editor-shell"><textarea id="sql-input" spellcheck="false"></textarea></div>

  <button id="calculate" class="primary">&#9654; Calculate Cost</button>

  <div id="result-card" class="result-card" style="display:none">
    <div class="cost" id="result-cost"></div>
    <div class="bytes" id="result-bytes"></div>
    <div class="proj" id="result-proj"></div>
  </div>
  <div id="result-error" class="error" style="display:none"></div>

  <div class="hint">
    Server: <code>uv run bqcheck-server</code>
  </div>

  <script src="vendor/codemirror/codemirror.js"></script>
  <script src="vendor/codemirror/sql.js"></script>
  <script src="vendor/codemirror/active-line.js"></script>
  <script src="vendor/codemirror/matchbrackets.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
